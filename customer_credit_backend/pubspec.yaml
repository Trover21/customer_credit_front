name: firest_flutter_project
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'
  
dependencies:
  flutter:
    sdk: flutter
# ኩሎም ፓኬጃት ኣብዚ ትሕቲ dependencies ብሓደ ደረጃ (Alignment) ይሃልዉ
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  http: ^1.6.0
  url_launcher: ^6.3.2
  flutter_sms: ^3.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 26